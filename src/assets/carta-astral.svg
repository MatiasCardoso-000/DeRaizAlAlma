<svg viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#001a4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000033;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="600" height="700" fill="url(#bgGradient)"/>
  
  <!-- Estrellas -->
  <circle cx="50" cy="50" r="1" fill="#ffd700" opacity="0.8"/>
  <circle cx="120" cy="80" r="0.8" fill="#ffd700" opacity="0.6"/>
  <circle cx="480" cy="60" r="1.2" fill="#ffd700" opacity="0.7"/>
  <circle cx="550" cy="120" r="0.8" fill="#ffd700" opacity="0.5"/>
  <circle cx="520" cy="200" r="1" fill="#ffd700" opacity="0.8"/>
  <circle cx="100" cy="300" r="0.9" fill="#ffd700" opacity="0.6"/>
  <circle cx="550" cy="400" r="1.1" fill="#ffd700" opacity="0.7"/>
  <circle cx="80" cy="550" r="0.8" fill="#ffd700" opacity="0.5"/>
  <circle cx="500" cy="600" r="1" fill="#ffd700" opacity="0.8"/>
  
  <!-- Luna -->
  <circle cx="100" cy="100" r="35" fill="#ffd700" opacity="0.3"/>
  <path d="M 130 80 Q 140 100 130 120" stroke="#ffd700" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Círculo exterior (Zodíaco) -->
  <circle cx="300" cy="350" r="180" fill="none" stroke="#d4915e" stroke-width="3" opacity="0.8"/>
  <circle cx="300" cy="350" r="175" fill="none" stroke="#c4784a" stroke-width="1" opacity="0.4"/>
  <circle cx="300" cy="350" r="185" fill="none" stroke="#c4784a" stroke-width="1" opacity="0.4"/>
  
  <!-- Zodiaco signos (simplificado) -->
  <text x="300" y="160" font-size="16" fill="#d4915e" text-anchor="middle" font-family="serif">♈</text>
  <text x="410" y="200" font-size="16" fill="#d4915e" text-anchor="middle" font-family="serif">♉</text>
  <text x="460" y="290" font-size="16" fill="#d4915e" text-anchor="middle" font-family="serif">♊</text>
  <text x="440" y="420" font-size="16" fill="#d4915e" text-anchor="middle" font-family="serif">♋</text>
  <text x="300" y="540" font-size="16" fill="#d4915e" text-anchor="middle" font-family="serif">♌</text>
  <text x="160" y="420" font-size="16" fill="#d4915e" text-anchor="middle" font-family="serif">♍</text>
  <text x="140" y="290" font-size="16" fill="#d4915e" text-anchor="middle" font-family="serif">♎</text>
  <text x="190" y="200" font-size="16" fill="#d4915e" text-anchor="middle" font-family="serif">♏</text>
  
  <!-- Círculos internos -->
  <circle cx="300" cy="350" r="140" fill="none" stroke="#c4784a" stroke-width="1" opacity="0.4"/>
  <circle cx="300" cy="350" r="100" fill="none" stroke="#c4784a" stroke-width="1" opacity="0.3"/>
  <circle cx="300" cy="350" r="60" fill="none" stroke="#c4784a" stroke-width="1" opacity="0.3"/>
  
  <!-- Planeta Sol (centro) -->
  <circle cx="300" cy="350" r="12" fill="#ffd700" filter="url(#glow)"/>
  <circle cx="300" cy="350" r="15" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
  
  <!-- Líneas de aspecto (triángulo) -->
  <line x1="300" y1="350" x2="380" y2="280" stroke="#d95d4d" stroke-width="2" opacity="0.6"/>
  <line x1="300" y1="350" x2="250" y2="280" stroke="#d95d4d" stroke-width="2" opacity="0.6"/>
  <line x1="380" y1="280" x2="250" y2="280" stroke="#d95d4d" stroke-width="2" opacity="0.6"/>
  
  <!-- Planets positions -->
  <circle cx="380" cy="280" r="6" fill="#c4784a" filter="url(#glow)"/>
  <circle cx="250" cy="280" r="5" fill="#8b9a7b" filter="url(#glow)"/>
  <circle cx="300" cy="430" r="6" fill="#d4915e" filter="url(#glow)"/>
  
  <!-- Líneas de casas -->
  <line x1="300" y1="170" x2="300" y2="530" stroke="#c4784a" stroke-width="1" opacity="0.2"/>
  <line x1="120" y1="350" x2="480" y2="350" stroke="#c4784a" stroke-width="1" opacity="0.2"/>
  <line x1="160" y1="200" x2="440" y2="500" stroke="#c4784a" stroke-width="1" opacity="0.15"/>
  <line x1="440" y1="200" x2="160" y2="500" stroke="#c4784a" stroke-width="1" opacity="0.15"/>
  
  <!-- Jupiter planeta derecha -->
  <circle cx="500" cy="350" r="8" fill="#d4915e" opacity="0.7" filter="url(#glow)"/>
  
  <!-- Título -->
  <text x="300" y="40" font-size="32" fill="#d4915e" text-anchor="middle" font-family="serif" font-style="italic" font-weight="bold">Carta Astral</text>
  
  <!-- Subtítulo -->
  <text x="300" y="670" font-size="12" fill="#c4784a" text-anchor="middle" font-family="serif">Mapa Natal - Lectura Personalizada</text>
</svg>